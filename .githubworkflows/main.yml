name: Build VaultPro APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ROOT_GRADLE: |
        plugins {
            id 'com.android.application' version '8.2.0' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }
      APP_GRADLE: |
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            compileSdk 34
            namespace "com.vaultpro.app"
            defaultConfig {
                applicationId "com.vaultpro.app"
                minSdk 22
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release { 
                    minifyEnabled false 
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
                debug { debuggable true }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
      SETTINGS_GRADLE: |
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "VaultPro"
        include ':app'
      MANIFEST: |
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:label="VaultPro" android:theme="@style/Theme.AppCompat.NoActionBar" android:hardwareAccelerated="true">
                <activity android:name="com.vaultpro.app.MainActivity" android:exported="true" android:configChanges="orientation|screenSize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
      MAIN_ACTIVITY: |
        package com.vaultpro.app
        import android.graphics.Color
        import android.os.Bundle
        import android.webkit.*
        import androidx.appcompat.app.AppCompatActivity
        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val webView = WebView(this)
                setContentView(webView)
                window.statusBarColor = Color.BLACK
                webView.settings.javaScriptEnabled = true
                webView.settings.domStorageEnabled = true
                webView.settings.allowFileAccess = true
                webView.settings.allowContentAccess = true
                webView.webViewClient = WebViewClient()
                webView.webChromeClient = WebChromeClient()
                webView.setBackgroundColor(Color.BLACK)
                webView.loadUrl("file:///android_asset/www/index.html")
            }
        }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Folders
        run: |
          mkdir -p app/src/main/java/com/vaultpro/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Sync Your Web Files
        run: |
          if [ -d "www" ]; then
            cp -r www/* app/src/main/assets/www/
          elif [ -f "index.html" ]; then
            cp index.html app/src/main/assets/www/
          fi
          echo "Web files synced."

      - name: Write Android Files
        run: |
          echo "$ROOT_GRADLE" > build.gradle
          echo "$APP_GRADLE" > app/build.gradle
          echo "$SETTINGS_GRADLE" > settings.gradle
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          echo "$MAIN_ACTIVITY" > app/src/main/java/com/vaultpro/app/MainActivity.kt
          echo "$MANIFEST" > app/src/main/AndroidManifest.xml
          echo '<resources><string name="app_name">VaultPro</string></resources>' > app/src/main/res/values/strings.xml

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaultPro-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: VaultPro v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
