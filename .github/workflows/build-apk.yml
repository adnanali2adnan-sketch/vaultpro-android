name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android Project
        run: |
          mkdir -p app/src/main/java/com/vaultpro/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values

          cp index.html app/src/main/assets/www/index.html

          cat > settings.gradle <<EOF
          rootProject.name='VaultPro'
          include ':app'
          EOF

          cat > build.gradle <<EOF
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          cat > app/build.gradle <<EOF
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.vaultpro.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.vaultpro.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.core:core-ktx:1.12.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="VaultPro"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">

                  <activity
                      android:name="com.vaultpro.app.MainActivity"
                      android:exported="true">

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>

                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/vaultpro/app/MainActivity.kt <<EOF
          package com.vaultpro.app

          import android.os.Bundle
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  val webView = WebView(this)

                  setContentView(webView)

                  webView.settings.javaScriptEnabled = true
                  webView.settings.domStorageEnabled = true
                  webView.webViewClient = WebViewClient()

                  webView.loadUrl("file:///android_asset/www/index.html")
              }
          }
          EOF

      - name: Create Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaultPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
