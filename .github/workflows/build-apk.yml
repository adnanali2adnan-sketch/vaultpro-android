name: Build VaultPro APK

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HTML_B64_1: ""
  HTML_B64_2: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          AHOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$AHOME" >> $GITHUB_ENV
          echo "$AHOME/platform-tools" >> $GITHUB_PATH
          echo "$AHOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $AHOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -3 || true

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/vaultpro/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values

      - name: Embed index.html from workflow
        run: |
          echo "${HTML_B64_1}${HTML_B64_2}" | base64 -d > app/src/main/assets/www/index.html
          echo "index.html size: $(wc -c < app/src/main/assets/www/index.html) bytes"

      - name: Generate all Android source files
        run: |
          python3 - << 'PYEOF'
import os

def w(path, content):
    os.makedirs(os.path.dirname(path), exist_ok=True)
    with open(path, 'w') as f: f.write(content)
    print("OK:", path)

w("app/src/main/java/com/vaultpro/app/MainActivity.kt", """package com.vaultpro.app
import android.graphics.Color; import android.os.Bundle
import android.webkit.WebSettings; import android.webkit.WebView
import android.webkit.WebViewClient; import android.webkit.WebChromeClient
import androidx.appcompat.app.AppCompatActivity
class MainActivity : AppCompatActivity() {
    private lateinit var webView: WebView
    override fun onCreate(s: Bundle?) {
        super.onCreate(s)
        window.statusBarColor = Color.parseColor("#0a0e1a")
        window.navigationBarColor = Color.parseColor("#0a0e1a")
        webView = WebView(this); setContentView(webView)
        webView.settings.apply {
            javaScriptEnabled = true; domStorageEnabled = true
            allowFileAccess = true; setSupportZoom(false)
            builtInZoomControls = false; useWideViewPort = true
            loadWithOverviewMode = true
        }
        webView.webViewClient = WebViewClient()
        webView.webChromeClient = WebChromeClient()
        webView.setBackgroundColor(Color.parseColor("#0a0e1a"))
        webView.loadUrl("file:///android_asset/www/index.html")
    }
    override fun onBackPressed() { if (webView.canGoBack()) webView.goBack() else super.onBackPressed() }
}
""")

w("app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.vaultpro.app">
  <application android:allowBackup="true" android:label="VaultPro"
    android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.VaultPro"
    android:hardwareAccelerated="true" android:supportsRtl="true">
    <activity android:name=".MainActivity" android:exported="true"
      android:configChanges="orientation|screenSize|keyboardHidden"
      android:windowSoftInputMode="adjustResize">
      <intent-filter>
        <action android:name="android.intent.action.MAIN"/>
        <category android:name="android.intent.category.LAUNCHER"/>
      </intent-filter>
    </activity>
  </application>
</manifest>
""")

w("app/src/main/res/values/strings.xml",
  '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">VaultPro</string></resources>')

w("app/src/main/res/values/themes.xml", """<?xml version="1.0" encoding="utf-8"?>
<resources>
  <style name="Theme.VaultPro" parent="Theme.AppCompat.NoActionBar">
    <item name="android:windowBackground">#0a0e1a</item>
    <item name="android:statusBarColor">#0a0e1a</item>
    <item name="android:navigationBarColor">#0a0e1a</item>
    <item name="android:windowLightStatusBar">false</item>
  </style>
</resources>
""")

w("app/proguard-rules.pro", "-keep class com.vaultpro.app.** { *; }\n")

w("build.gradle", """plugins {
  id 'com.android.application' version '8.2.0' apply false
  id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
}
""")

w("app/build.gradle", """plugins {
  id 'com.android.application'
  id 'kotlin-android'
}
android {
  compileSdk 34
  namespace "com.vaultpro.app"
  defaultConfig {
    applicationId "com.vaultpro.app"
    minSdk 21; targetSdk 34
    versionCode 1; versionName "1.0"
  }
  buildTypes {
    release { minifyEnabled false }
    debug   { debuggable true }
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions { jvmTarget = '17' }
}
dependencies {
  implementation 'androidx.core:core-ktx:1.12.0'
  implementation 'androidx.appcompat:appcompat:1.6.1'
}
""")

w("settings.gradle", """pluginManagement {
  repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
  repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
  repositories { google(); mavenCentral() }
}
rootProject.name = "VaultPro"
include ':app'
""")

print("All files generated!")
PYEOF

      - name: Verify files
        run: |
          echo "=== app structure ==="
          find app -type f | sort
          echo "index.html: $(wc -c < app/src/main/assets/www/index.html) bytes"

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaultPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: VaultPro v1.0.${{ github.run_number }}
          body: |
            ## VaultPro APK Ready!
            app-debug.apk download karein.
            Settings > Security > Unknown Sources ON karein, phir install karein.
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
