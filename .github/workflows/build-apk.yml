
name: Build VaultPro APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android project from uploaded files
        run: |
          set -e

          # ── Create folder structure ────────────────────────────────────
          mkdir -p app/src/main/java/com/vaultpro/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # ── Copy app HTML (flat or nested) ────────────────────────────
          HTML=$(find . -name "index.html" ! -path "*/node_modules/*" | head -1)
          if [ -n "$HTML" ]; then
            cp "$HTML" app/src/main/assets/www/index.html
            echo "✅ index.html copied"
          else
            echo "❌ index.html not found!"; exit 1
          fi

          # ── Copy source files if uploaded flat ────────────────────────
          [ -f "MainActivity.kt" ]         && cp MainActivity.kt         app/src/main/java/com/vaultpro/app/
          [ -f "AndroidManifest.xml" ]     && cp AndroidManifest.xml     app/src/main/
          [ -f "strings.xml" ]             && cp strings.xml             app/src/main/res/values/
          [ -f "themes.xml" ]              && cp themes.xml              app/src/main/res/values/
          [ -f "proguard-rules.pro" ]      && cp proguard-rules.pro      app/
          [ -f "gradle-wrapper.properties" ] && cp gradle-wrapper.properties gradle/wrapper/

          # ── Handle two build.gradle files ─────────────────────────────
          # If both are flat, we must regenerate them correctly
          echo "🔧 Writing project-level build.gradle"
          cat > build.gradle << 'GRADLE_ROOT'
plugins {
    id 'com.android.application' version '8.2.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
}
GRADLE_ROOT

          echo "🔧 Writing app/build.gradle"
          cat > app/build.gradle << 'GRADLE_APP'
plugins {
    id 'com.android.application'
    id 'kotlin-android'
}
android {
    compileSdk 34
    namespace "com.vaultpro.app"
    defaultConfig {
        applicationId "com.vaultpro.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release { minifyEnabled false }
        debug   { debuggable true }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
}
dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
GRADLE_APP

          # ── Ensure critical files exist (fallback generate) ────────────
          if [ ! -f "app/src/main/java/com/vaultpro/app/MainActivity.kt" ]; then
            echo "🔧 Generating MainActivity.kt"
            cat > app/src/main/java/com/vaultpro/app/MainActivity.kt << 'KOTLIN'
package com.vaultpro.app
import android.graphics.Color
import android.os.Bundle
import android.webkit.WebSettings
import android.webkit.WebView
import android.webkit.WebViewClient
import android.webkit.WebChromeClient
import androidx.appcompat.app.AppCompatActivity
class MainActivity : AppCompatActivity() {
    private lateinit var webView: WebView
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        window.statusBarColor = Color.parseColor("#0a0e1a")
        window.navigationBarColor = Color.parseColor("#0a0e1a")
        webView = WebView(this)
        setContentView(webView)
        val s: WebSettings = webView.settings
        s.javaScriptEnabled = true
        s.domStorageEnabled = true
        s.allowFileAccess = true
        s.setSupportZoom(false)
        s.builtInZoomControls = false
        s.useWideViewPort = true
        s.loadWithOverviewMode = true
        webView.webViewClient = WebViewClient()
        webView.webChromeClient = WebChromeClient()
        webView.setBackgroundColor(Color.parseColor("#0a0e1a"))
        webView.loadUrl("file:///android_asset/www/index.html")
    }
    override fun onBackPressed() {
        if (webView.canGoBack()) webView.goBack() else super.onBackPressed()
    }
}
KOTLIN
          fi

          if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
            echo "🔧 Generating AndroidManifest.xml"
            cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.vaultpro.app">
    <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name" android:theme="@style/Theme.VaultPro"
        android:hardwareAccelerated="true" android:supportsRtl="true">
        <activity android:name=".MainActivity" android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden"
            android:windowSoftInputMode="adjustResize">
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST
          fi

          if [ ! -f "app/src/main/res/values/strings.xml" ]; then
            echo "🔧 Generating strings.xml"
            echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">VaultPro</string></resources>' > app/src/main/res/values/strings.xml
          fi

          if [ ! -f "app/src/main/res/values/themes.xml" ]; then
            echo "🔧 Generating themes.xml"
            cat > app/src/main/res/values/themes.xml << 'THEMES'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="Theme.VaultPro" parent="Theme.AppCompat.NoActionBar">
        <item name="android:windowBackground">#0a0e1a</item>
        <item name="android:statusBarColor">#0a0e1a</item>
        <item name="android:navigationBarColor">#0a0e1a</item>
        <item name="android:windowLightStatusBar">false</item>
    </style>
</resources>
THEMES
          fi

          if [ ! -f "settings.gradle" ]; then
            cat > settings.gradle << 'SETTINGS'
pluginManagement {
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories { google(); mavenCentral() }
}
rootProject.name = "VaultPro"
include ':app'
SETTINGS
          fi

          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
networkTimeout=10000
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS

          # ── Download Gradle wrapper JAR ────────────────────────────────
          echo "⬇️ Downloading gradle-wrapper.jar"
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

          chmod +x gradlew 2>/dev/null || true

          echo "📁 Final project structure:"
          find app -type f | sort
          find gradle -type f | sort

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "VaultPro v1.0.${{ github.run_number }}"
          body: |
            ## ✅ VaultPro Password Manager APK Ready!

            ### Install kaise karein:
            1. **`app-debug.apk`** download karein (neeche)
            2. Phone mein: Settings → Security → **Unknown Sources ON** karein
            3. APK open karein → Install karein
            4. Done! App bilkul offline chalega 🔒

            ### Features:
            - 100% Offline — koi internet nahi chahiye
            - Add/Edit/Delete passwords with custom names
            - Categories: Gmail, Crypto, Games, Social Media, Banking
            - Password Generator with strength meter
            - Search & Filter, Copy, Show/Hide password
            - Export TXT / Print PDF
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
