name: Build VaultPro APK

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK components
        run: |
          ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            2>/dev/null | tail -5 || true
          echo "Android SDK ready"

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.4/bin" >> $GITHUB_PATH
          /opt/gradle-8.4/bin/gradle --version

      - name: Create project folders
        run: |
          mkdir -p app/src/main/java/com/vaultpro/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values

      - name: Copy index.html to assets
        run: |
          HTML=$(find . -name "index.html" ! -path "*/node_modules/*" | head -1)
          if [ -z "$HTML" ]; then echo "ERROR index.html not found"; exit 1; fi
          cp "$HTML" app/src/main/assets/www/index.html
          echo "OK: $HTML copied"

      - name: Move flat-uploaded files to correct folders
        run: |
          [ -f "MainActivity.kt" ]     && cp MainActivity.kt     app/src/main/java/com/vaultpro/app/
          [ -f "AndroidManifest.xml" ] && cp AndroidManifest.xml app/src/main/
          [ -f "strings.xml" ]         && cp strings.xml         app/src/main/res/values/
          [ -f "themes.xml" ]          && cp themes.xml          app/src/main/res/values/
          [ -f "proguard-rules.pro" ]  && cp proguard-rules.pro  app/
          echo "Flat files moved"

      - name: Generate missing source files
        run: |
          python3 - << 'PYEOF'
          import os

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              if not os.path.exists(path):
                  with open(path, 'w') as f:
                      f.write(content)
                  print(f"Generated: {path}")
              else:
                  print(f"Exists:    {path}")

          write("app/src/main/java/com/vaultpro/app/MainActivity.kt", """package com.vaultpro.app
          import android.graphics.Color
          import android.os.Bundle
          import android.webkit.WebSettings
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import android.webkit.WebChromeClient
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              private lateinit var webView: WebView
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  window.statusBarColor = Color.parseColor("#0a0e1a")
                  window.navigationBarColor = Color.parseColor("#0a0e1a")
                  webView = WebView(this)
                  setContentView(webView)
                  val s: WebSettings = webView.settings
                  s.javaScriptEnabled = true
                  s.domStorageEnabled = true
                  s.allowFileAccess = true
                  s.setSupportZoom(false)
                  s.useWideViewPort = true
                  s.loadWithOverviewMode = true
                  webView.webViewClient = WebViewClient()
                  webView.webChromeClient = WebChromeClient()
                  webView.setBackgroundColor(Color.parseColor("#0a0e1a"))
                  webView.loadUrl("file:///android_asset/www/index.html")
              }
              override fun onBackPressed() {
                  if (webView.canGoBack()) webView.goBack() else super.onBackPressed()
              }
          }
          """)

          write("app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.vaultpro.app">
              <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name" android:theme="@style/Theme.VaultPro"
                  android:hardwareAccelerated="true" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """)

          write("app/src/main/res/values/strings.xml",
              '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">VaultPro</string></resources>')

          write("app/src/main/res/values/themes.xml", """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.VaultPro" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#0a0e1a</item>
                  <item name="android:statusBarColor">#0a0e1a</item>
                  <item name="android:navigationBarColor">#0a0e1a</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          """)

          write("app/proguard-rules.pro", "-keep class com.vaultpro.app.** { *; }\n")

          with open("build.gradle", "w") as f:
              f.write("""plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          """)

          with open("app/build.gradle", "w") as f:
              f.write("""plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }
          android {
              compileSdk 34
              namespace "com.vaultpro.app"
              defaultConfig {
                  applicationId "com.vaultpro.app"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release { minifyEnabled false }
                  debug   { debuggable true }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          """)

          with open("settings.gradle", "w") as f:
              f.write("""pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "VaultPro"
          include ':app'
          """)

          print("All files ready!")
          PYEOF

      - name: Show final structure
        run: find app -type f | sort

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaultPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: VaultPro v1.0.${{ github.run_number }}
          body: |
            ## VaultPro APK Ready!
            Neeche app-debug.apk download karein.
            Settings > Security > Unknown Sources ON karein, phir install karein.
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
