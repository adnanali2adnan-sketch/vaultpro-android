
name: Build VaultPro APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ROOT_GRADLE: |
        plugins {
            id 'com.android.application' version '8.2.0' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
        }
      APP_GRADLE: |
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            compileSdk 34
            namespace "com.vaultpro.app"
            defaultConfig {
                applicationId "com.vaultpro.app"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release { minifyEnabled false }
                debug   { debuggable true }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = '17' }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
      SETTINGS_GRADLE: |
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "VaultPro"
        include ':app'
      MANIFEST: |
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.vaultpro.app">
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name" android:theme="@style/Theme.VaultPro"
                android:hardwareAccelerated="true" android:supportsRtl="true">
                <activity android:name=".MainActivity" android:exported="true"
                    android:configChanges="orientation|screenSize|keyboardHidden"
                    android:windowSoftInputMode="adjustResize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
      MAIN_ACTIVITY: |
        package com.vaultpro.app
        import android.graphics.Color
        import android.os.Bundle
        import android.webkit.WebSettings
        import android.webkit.WebView
        import android.webkit.WebViewClient
        import android.webkit.WebChromeClient
        import androidx.appcompat.app.AppCompatActivity
        class MainActivity : AppCompatActivity() {
            private lateinit var webView: WebView
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                window.statusBarColor = Color.parseColor("#0a0e1a")
                window.navigationBarColor = Color.parseColor("#0a0e1a")
                webView = WebView(this)
                setContentView(webView)
                val s: WebSettings = webView.settings
                s.javaScriptEnabled = true
                s.domStorageEnabled = true
                s.allowFileAccess = true
                s.setSupportZoom(false)
                s.builtInZoomControls = false
                s.useWideViewPort = true
                s.loadWithOverviewMode = true
                webView.webViewClient = WebViewClient()
                webView.webChromeClient = WebChromeClient()
                webView.setBackgroundColor(Color.parseColor("#0a0e1a"))
                webView.loadUrl("file:///android_asset/www/index.html")
            }
            override fun onBackPressed() {
                if (webView.canGoBack()) webView.goBack() else super.onBackPressed()
            }
        }
      STRINGS: |
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">VaultPro</string>
        </resources>
      THEMES: |
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.VaultPro" parent="Theme.AppCompat.NoActionBar">
                <item name="android:windowBackground">#0a0e1a</item>
                <item name="android:statusBarColor">#0a0e1a</item>
                <item name="android:navigationBarColor">#0a0e1a</item>
                <item name="android:windowLightStatusBar">false</item>
            </style>
        </resources>
      WRAPPER_PROPS: |
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
        networkTimeout=10000
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create folder structure
        run: |
          mkdir -p app/src/main/java/com/vaultpro/app
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Copy index.html to assets
        run: |
          HTML=$(find . -name "index.html" ! -path "*/node_modules/*" | head -1)
          if [ -z "$HTML" ]; then echo "ERROR: index.html not found"; exit 1; fi
          cp "$HTML" app/src/main/assets/www/index.html
          echo "Copied: $HTML"

      - name: Move flat source files to correct folders
        run: |
          [ -f "MainActivity.kt" ]           && cp MainActivity.kt           app/src/main/java/com/vaultpro/app/
          [ -f "AndroidManifest.xml" ]       && cp AndroidManifest.xml       app/src/main/
          [ -f "strings.xml" ]               && cp strings.xml               app/src/main/res/values/
          [ -f "themes.xml" ]                && cp themes.xml                app/src/main/res/values/
          [ -f "proguard-rules.pro" ]        && cp proguard-rules.pro        app/
          [ -f "gradle-wrapper.properties" ] && cp gradle-wrapper.properties gradle/wrapper/

      - name: Write Gradle and config files
        run: |
          printf '%s' "$ROOT_GRADLE"   > build.gradle
          printf '%s' "$APP_GRADLE"    > app/build.gradle
          printf '%s' "$SETTINGS_GRADLE" > settings.gradle
          printf '%s' "$WRAPPER_PROPS" > gradle/wrapper/gradle-wrapper.properties

      - name: Write Android source files (if missing)
        run: |
          if [ ! -f "app/src/main/java/com/vaultpro/app/MainActivity.kt" ]; then
            printf '%s' "$MAIN_ACTIVITY" > app/src/main/java/com/vaultpro/app/MainActivity.kt
          fi
          if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
            printf '%s' "$MANIFEST" > app/src/main/AndroidManifest.xml
          fi
          if [ ! -f "app/src/main/res/values/strings.xml" ]; then
            printf '%s' "$STRINGS" > app/src/main/res/values/strings.xml
          fi
          if [ ! -f "app/src/main/res/values/themes.xml" ]; then
            printf '%s' "$THEMES" > app/src/main/res/values/themes.xml
          fi
          if [ ! -f "app/proguard-rules.pro" ]; then
            echo "-keep class com.vaultpro.app.** { *; }" > app/proguard-rules.pro
          fi

      - name: Download Gradle wrapper JAR
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Show project structure
        run: |
          echo "=== Project files ==="
          find app -type f | sort
          find gradle -type f | sort

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VaultPro-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: VaultPro v1.0.${{ github.run_number }}
          body: |
            ## VaultPro APK Ready!
            app-debug.apk download karein, phone mein Unknown Sources ON karein, install karein.
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
